<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ТапкиДроп</title>
  <meta name="theme-color" content="#ffffff">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="logo" onclick="window.go('home')">ТАПКИ<span>ДРОП</span></div>
      <div class="search-wrap"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="search-input" placeholder="Поиск..."></div>
      <button class="cart-btn" onclick="window.go('cart')"><i class="fa-solid fa-bag-shopping"></i><span id="cart-badge">0</span></button>
    </div>
  </header>

  <nav class="categories-nav">
    <div class="container">
      <button class="cat-btn active" data-cat="all">Все</button>
      <button class="cat-btn" data-cat="designer">Дизайнерские</button>
      <button class="cat-btn" data-cat="kids">Детские</button>
      <button class="cat-btn" data-cat="swag">Сваг</button>
      <button class="cat-btn" data-cat="classics">Классика</button>
      <button class="cat-btn" data-cat="sale">Распродажа</button>
    </div>
  </nav>

  <main class="app-main">
    <section id="home" class="page active">
      <div class="container">
        <div class="promo-banner"><div class="promo-text"><span class="promo-tag">🔥 DROP 2026</span><h1>Стиль без компромиссов</h1><button class="btn btn--primary" onclick="window.go('catalog')">В каталог</button></div><div class="promo-img">👟</div></div>
        <div class="section-header"><h2>Популярное</h2></div>
        <div class="grid" id="home-grid"></div>
      </div>
    </section>

    <section id="catalog" class="page"><div class="container"><div class="grid" id="catalog-grid"></div></div></section>

    <section id="product" class="page">
      <div class="container">
        <button class="back-btn" onclick="window.go('catalog')"><i class="fa-solid fa-arrow-left"></i> Назад</button>
        <div class="product-detail">
          <div class="product-media"><div class="main-img" id="detail-img">👟</div></div>
          <div class="product-info">
            <div class="brand" id="detail-brand">БРЕНД</div><h1 id="detail-name">Название</h1>
            <div class="price-block"><span class="current" id="detail-price">0 ₽</span></div>
            <p id="detail-desc" class="desc"></p>
            <div class="sizes" id="sizes-container"></div>
            <button class="btn btn--primary full" onclick="window.addToCartFromDetail()">В корзину</button>
          </div>
        </div>
      </div>
    </section>

    <section id="cart" class="page">
      <div class="container">
        <h1>Корзина</h1>
        <div id="cart-empty" style="display:none;text-align:center;padding:40px"><p>Пусто</p><button class="btn btn--primary" onclick="window.go('catalog')">В каталог</button></div>
        <div id="cart-layout" style="display:none">
          <div id="cart-items" style="margin-bottom:20px"></div>
          <div class="cart-summary"><div class="summary-row total"><span>Итого</span><span id="cart-total">0 ₽</span></div><button class="btn btn--primary full" id="checkout-btn" onclick="window.checkout()">Оформить</button></div>
        </div>
      </div>
    </section>

    <section id="my-orders" class="page">
      <div class="container"><button class="back-btn" onclick="window.go('profile')"><i class="fa-solid fa-arrow-left"></i> Назад</button><h1>Мои заказы</h1><div id="my-orders-list"></div></div>
    </section>

    <section id="profile" class="page">
      <div class="profile-header"><div class="avatar-wrap">👤</div><h2 id="profile-display-name">Гость</h2><p id="profile-email">Войдите в аккаунт</p></div>
      <div class="container">
        <div class="menu-grid">
          <div class="menu-item" onclick="window.go('my-orders')"><i class="fa-solid fa-bag-shopping"></i><span>Мои заказы</span><i class="fa-solid fa-chevron-right"></i></div>
          <div class="menu-item" onclick="window.openPVZ()"><i class="fa-solid fa-location-dot"></i><span>Адрес доставки</span><i class="fa-solid fa-chevron-right"></i></div>
          <div class="menu-item" onclick="window.openChat()"><i class="fa-solid fa-headset"></i><span>Поддержка</span><i class="fa-solid fa-chevron-right"></i></div>
        </div>
        <div id="auth-flow">
          <div class="auth-card">
            <div class="tabs"><button class="tab active" data-tab="login">Вход</button><button class="tab" data-tab="reg">Рег</button></div>
            <form id="auth-form">
              <input type="email" id="email-in" placeholder="Email" class="input" required>
              <input type="password" id="pass-in" placeholder="Пароль" class="input" required>
              <div id="auth-err" class="error" style="display:none"></div>
              <button type="submit" class="btn btn--primary full" id="auth-btn">Войти</button>
            </form>
          </div>
        </div>
        <div id="profile-acts" style="display:none"><button id="logout-btn" class="btn btn--danger full">Выйти</button></div>
      </div>
    </section>

    <section id="admin" class="page">
      <div class="container">
        <button class="back-btn" onclick="window.go('profile')"><i class="fa-solid fa-arrow-left"></i> Назад</button>
        <h1>Админка</h1>
        <div class="admin-stats"><div class="stat-box"><span id="st-orders">0</span><small>Заказов</small></div><div class="stat-box"><span id="st-rev">0 ₽</span><small>Выручка</small></div></div>
        <div class="admin-card">
          <h3>➕ Добавить товар</h3>
          <input type="text" id="add-name" placeholder="Название" class="input">
          <input type="number" id="add-price" placeholder="Цена" class="input">
          <select id="add-cat" class="input"><option value="designer">Дизайнерские</option><option value="kids">Детские</option><option value="swag">Сваг</option><option value="classics">Классика</option><option value="sale">Распродажа</option></select>
          <input type="text" id="add-sizes" placeholder="39,40,41" class="input">
          <input type="text" id="add-img" placeholder="Ссылка на фото" class="input">
          <textarea id="add-desc" placeholder="Описание" class="input" style="height:50px"></textarea>
          <button class="btn btn--primary full" onclick="window.addProd()">💾 Опубликовать</button>
        </div>
        <div class="admin-card"><h3>📦 Товары</h3><div id="admin-prods"></div></div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="window.go('home')"><i class="fa-solid fa-house"></i><span>Главная</span></button>
    <button class="nav-item" onclick="window.go('catalog')"><i class="fa-solid fa-store"></i><span>Каталог</span></button>
    <button class="nav-item" onclick="window.go('cart')"><i class="fa-solid fa-bag-shopping"></i><span>Корзина</span></button>
    <button class="nav-item" onclick="window.go('profile')"><i class="fa-regular fa-user"></i><span>Профиль</span></button>
  </nav>

  <!-- MODALS (HIDDEN BY DEFAULT) -->
  <div id="chat-modal" style="display:none; position:fixed; inset:0; background:#fff; z-index:9999; flex-direction:column;">
    <div style="background:var(--primary);color:#fff;padding:16px;display:flex;align-items:center"><button onclick="window.closeChat()" style="background:none;border:none;color:#fff;font-size:1.2rem;margin-right:12px">✕</button><span>Поддержка</span></div>
    <div id="chat-body" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px"></div>
    <div style="padding:12px;border-top:1px solid #eee;display:flex;gap:10px"><input id="chat-in" placeholder="Вопрос..." style="flex:1;padding:10px;border:1px solid #ccc;border-radius:8px"><button onclick="window.sendMsg()" style="padding:10px 16px;background:var(--primary);color:#fff;border:none;border-radius:8px">→</button></div>
  </div>

  <div id="pvz-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:10000; align-items:center; justify-content:center; padding:16px;">
    <div style="background:#fff;border-radius:12px;width:100%;max-width:320px;padding:20px">
      <h3>Адрес доставки</h3>
      <input id="pvz-city" placeholder="Город" class="input">
      <input id="pvz-addr" placeholder="Улица, дом, ПВЗ" class="input">
      <button onclick="window.savePVZ()" class="btn btn--primary full">💾 Сохранить</button>
      <button onclick="window.closePVZ()" class="btn btn--outline full" style="margin-top:8px">Отмена</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
