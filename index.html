<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ТапкиДроп</title>
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <div class="logo" onclick="window.navigate('home')">ТАПКИ<span>ДРОП</span></div>
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="search-input" placeholder="Поиск...">
      </div>
      <button class="cart-btn" onclick="window.navigate('cart')">
        <i class="fa-solid fa-bag-shopping"></i><span id="cart-badge">0</span>
      </button>
    </div>
  </header>

  <nav class="categories-nav">
    <div class="container">
      <button class="cat-btn active" data-cat="all">Все</button>
      <button class="cat-btn" data-cat="designer">Дизайнерские</button>
      <button class="cat-btn" data-cat="kids">Детские</button>
      <button class="cat-btn" data-cat="swag">Сваг</button>
      <button class="cat-btn" data-cat="classics">Классика</button>
      <button class="cat-btn" data-cat="sale">Распродажа</button>
    </div>
  </nav>

  <main class="app-main">
    <section id="home" class="page active">
      <div class="container">
        <div class="promo-banner">
          <div class="promo-text">
            <span class="promo-tag">🔥 DROP 2026</span>
            <h1>Стиль без компромиссов</h1>
            <button class="btn btn--primary" onclick="window.navigate('catalog')">В каталог</button>
          </div>
          <div class="promo-img">👟</div>
        </div>
        <div class="section-header"><h2>Популярное</h2></div>
        <div class="grid" id="home-grid"></div>
      </div>
    </section>

    <section id="catalog" class="page">
      <div class="container"><div class="grid" id="catalog-grid"></div></div>
    </section>

    <section id="product" class="page">
      <div class="container">
        <button class="back-btn" onclick="window.navigate('catalog')"><i class="fa-solid fa-arrow-left"></i> Назад</button>
        <div class="product-detail">
          <div class="product-media"><div class="main-img" id="detail-img">👟</div></div>
          <div id="product-thumbs" class="thumbs-row"></div>
          <div class="product-info">
            <div class="brand" id="detail-brand">BRAND</div>
            <h1 id="detail-name">Name</h1>
            <div class="price-block"><span class="current" id="detail-price">0 ₽</span></div>
            <p id="detail-desc" class="desc"></p>
            <div class="sizes" id="sizes-container"></div>
            <button class="btn btn--primary full" onclick="window.addToCartFromDetail()">В корзину</button>
          </div>
        </div>
        <div class="reviews-section"><h3>Отзывы</h3><div class="reviews-list" id="reviews-list"></div></div>
      </div>
    </section>

    <section id="cart" class="page">
      <div class="container">
        <h1 class="page-title">Корзина</h1>
        <div id="cart-empty" style="display:none;text-align:center;padding:40px"><p>Пусто</p><button class="btn btn--primary" onclick="window.navigate('catalog')">В каталог</button></div>
        <div class="cart-layout" id="cart-layout" style="display:none">
          <div class="cart-items" id="cart-items"></div>
          <div class="cart-summary">
            <div class="summary-row total"><span>Итого</span><span id="cart-total">0 ₽</span></div>
            <button class="btn btn--primary full" onclick="window.checkout()">Оформить</button>
          </div>
        </div>
      </div>
    </section>

    <section id="my-orders" class="page">
      <div class="container">
        <button class="back-btn" onclick="window.navigate('profile')"><i class="fa-solid fa-arrow-left"></i> Профиль</button>
        <h1 class="page-title">Мои заказы</h1>
        <div id="my-orders-list"></div>
      </div>
    </section>

    <section id="profile" class="page">
      <div class="profile-header">
        <div class="avatar-wrap"><div class="avatar">👤</div></div>
        <h2 id="profile-display-name">Гость</h2>
        <p id="profile-email">Войдите</p>
      </div>
      <div class="container">
        <div class="menu-grid">
          <div class="menu-item" onclick="window.navigate('my-orders')"><i class="fa-solid fa-bag-shopping"></i><span>Мои заказы</span><i class="fa-solid fa-chevron-right"></i></div>
          
          <!-- PVZ Address Button -->
          <div class="menu-item" onclick="window.openPVZModal()">
            <i class="fa-solid fa-location-dot"></i>
            <span>Адрес доставки</span>
            <i class="fa-solid fa-chevron-right"></i>
          </div>

          <div class="menu-item" onclick="window.openSupportChat()"><i class="fa-solid fa-headset"></i><span>Поддержка</span><i class="fa-solid fa-chevron-right"></i></div>
        </div>
        <div id="auth-flow">
          <div class="auth-card">
            <div class="tabs"><button class="tab active" data-tab="login">Вход</button><button class="tab" data-tab="register">Рег</button></div>
            <form id="auth-form">
              <input type="email" id="email-input" placeholder="Email" class="input" required>
              <input type="password" id="pass-input" placeholder="Пароль" class="input" required>
              <div id="auth-error" class="error" style="display:none"></div>
              <button type="submit" class="btn btn--primary full" id="auth-submit">Войти</button>
            </form>
          </div>
        </div>
        <div id="profile-actions" style="display:none"><button id="logout-btn" class="btn btn--danger full">Выйти</button></div>
      </div>
    </section>

    <section id="admin" class="page">
      <div class="container">
        <button class="back-btn" onclick="window.navigate('profile')"><i class="fa-solid fa-arrow-left"></i> Профиль</button>
        <h1>Админка</h1>
        <div id="admin-stats" class="admin-stats"></div>
        <div class="admin-grid"><div class="admin-card"><h3>Заказы</h3><div id="orders-list-admin"></div></div></div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" data-target="home"><i class="fa-solid fa-house"></i><span>Главная</span></button>
    <button class="nav-item" data-target="catalog"><i class="fa-solid fa-store"></i><span>Каталог</span></button>
    <button class="nav-item" data-target="cart"><i class="fa-solid fa-bag-shopping"></i><span>Корзина</span></button>
    <button class="nav-item" data-target="profile"><i class="fa-regular fa-user"></i><span>Профиль</span></button>
  </nav>

  <!-- FULLSCREEN SUPPORT MODAL -->
  <div id="support-modal" class="support-fullscreen" style="display:none">
    <div class="support-header">
      <button onclick="window.closeSupportChat()" style="background:none;border:none;color:#fff;font-size:1.2rem">✕</button>
      <h3 style="margin:0;color:#fff;font-size:1.1rem">Поддержка</h3>
      <div style="width:24px"></div>
    </div>
    <div class="support-body" id="chat-messages"></div>
    <div class="support-footer">
      <input type="text" id="chat-input" placeholder="Введите вопрос или команду...">
      <button onclick="window.sendChatMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </div>

  <!-- PVZ / ADDRESS MODAL -->
  <div id="pvz-modal" class="pvz-modal" style="display:none">
    <div class="pvz-content">
      <div class="pvz-header"><h3>Адрес доставки</h3><button onclick="window.closePVZModal()">✕</button></div>
      <div style="padding:16px">
        <p style="color:var(--muted);font-size:0.9rem;margin-bottom:16px">Укажите адрес ПВЗ Wildberries или другой адрес:</p>
        <input type="text" id="pvz-city" placeholder="Город (напр. Москва)" class="input">
        <input type="text" id="pvz-address" placeholder="Адрес (напр. ул. Ленина, 5)" class="input">
        <input type="text" id="pvz-details" placeholder="Детали (напр. ПВЗ №12345)" class="input">
        <button class="btn btn--primary full" onclick="window.savePVZ()">💾 Сохранить адрес</button>
      </div>
    </div>
  </div>

  <div id="level-toast" class="toast"><div class="toast-icon">🚀</div><div><div class="toast-title">Готово</div><div class="toast-desc" id="toast-desc"></div></div></div>

  <script src="js/app.js"></script>
</body>
</html>
